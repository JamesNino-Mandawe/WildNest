<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Print WildNest ERD</title>
  <style>
    body { margin: 0; background: #f4f1eb; font-family: "Segoe UI", Arial, sans-serif; }
    .wrap { display: flex; justify-content: center; padding: 20px; }
    img { width: 100%; max-width: 1600px; height: auto; background: white; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    @media print {
      body { background: white; }
      .wrap { padding: 0; }
      img { max-width: none; width: 100%; box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="WildNest_ERD_FINAL.svg" alt="WildNest ERD">
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WildNest — Booking Pass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
/* ── Reset ────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Design tokens ────────────────────────────────────────────────── */
:root {
  --ink:        #071a0e;
  --ink-2:      #0d2e18;
  --gold:       #d4a017;
  --gold-lt:    #e9c052;
  --sage:       #8fb89a;
  --cream:      #f8f4ef;
  --mist:       #e8ede9;
  --card:       #ffffff;
  --shadow:     rgba(7, 26, 14, 0.18);

  /* Status colours — used by JS to set --status-* vars on .pass */
  --status-bg:     rgba(212,160,23,.13);
  --status-border: rgba(212,160,23,.40);
  --status-text:   #e9c052;
  --status-dot:    #d4a017;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--ink);
  color: var(--cream);
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ── Atmospheric background ───────────────────────────────────────── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: -2;
  background:
    radial-gradient(ellipse 70% 55% at 15%  8%,  rgba(212,160,23,.09)  0%, transparent 55%),
    radial-gradient(ellipse 55% 65% at 88% 85%,  rgba(143,184,154,.08) 0%, transparent 55%),
    radial-gradient(ellipse 100% 100% at 50% 50%, var(--ink)            0%, #040f08 100%);
}
body::after {
  content: '';
  position: fixed; inset: 0; z-index: -1;
  background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M60 0 Q66 28 82 60 Q66 92 60 120 Q54 92 38 60 Q54 28 60 0Z' fill='none' stroke='%238fb89a' stroke-width='.25' opacity='.15'/%3E%3C/svg%3E");
  background-size: 120px 120px;
}

/* ── Page shell ───────────────────────────────────────────────────── */
.page {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 52px 20px 88px;
}

/* ── Wordmark ─────────────────────────────────────────────────────── */
.logo-bar {
  text-align: center;
  margin-bottom: 44px;
  animation: fadeDown .65s ease both;
}
.logo-bar .wordmark {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: clamp(26px, 6vw, 40px);
  font-weight: 700;
  letter-spacing: 7px;
  color: var(--gold);
  line-height: 1;
}
.logo-bar .sub {
  font-size: 10.5px;
  letter-spacing: 2.8px;
  color: var(--sage);
  margin-top: 7px;
  text-transform: uppercase;
}

/* ── Boarding-pass card ───────────────────────────────────────────── */
.pass {
  width: 100%;
  max-width: 480px;
  background: var(--card);
  border-radius: 22px;
  overflow: hidden;
  box-shadow:
    0 36px 90px var(--shadow),
    0 0 0 1px rgba(212,160,23,.12);
  animation: riseUp .7s cubic-bezier(.22,1,.36,1) .12s both;
  color: var(--ink);
}

/* ── Pass header (dark band) ──────────────────────────────────────── */
.pass-head {
  background: var(--ink);
  padding: 30px 32px 32px;
  position: relative;
}
/* Curved notch that joins header to body */
.pass-head::after {
  content: '';
  position: absolute;
  bottom: -14px; left: 0; right: 0;
  height: 28px;
  background: var(--card);
  border-radius: 55% 55% 0 0 / 100%;
}

/* Status pill — colours injected by JS via CSS variables on .pass */
.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: var(--status-bg);
  border: 1px solid var(--status-border);
  border-radius: 99px;
  padding: 4px 14px 4px 10px;
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 1.4px;
  color: var(--status-text);
  text-transform: uppercase;
  margin-bottom: 14px;
}
.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--status-dot);
  flex-shrink: 0;
}

.guest-name {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: clamp(23px, 5vw, 33px);
  font-weight: 600;
  color: var(--cream);
  line-height: 1.18;
}

.booking-ref {
  font-size: 12.5px;
  color: var(--sage);
  margin-top: 7px;
  letter-spacing: .4px;
}
.booking-ref strong {
  color: var(--gold-lt);
  font-size: 14.5px;
  letter-spacing: 1px;
}

/* ── Pass body ────────────────────────────────────────────────────── */
.pass-body {
  padding: 38px 32px 26px;
}

.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px 16px;
  margin-bottom: 26px;
}
.detail-item .lbl {
  font-size: 9.5px;
  letter-spacing: 1.9px;
  text-transform: uppercase;
  color: #999;
  margin-bottom: 3px;
}
.detail-item .val {
  font-size: 13.5px;
  font-weight: 500;
  color: var(--ink);
  line-height: 1.35;
}
.detail-item.full { grid-column: 1 / -1; }
.detail-item.amount .val {
  font-size: 17px;
  font-weight: 700;
}

/* Perforated divider */
.perf {
  border: none;
  border-top: 1.5px dashed #ddd;
  margin: 2px 0 26px;
}

/* ── QR block ─────────────────────────────────────────────────────── */
.qr-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  padding: 22px;
  background: var(--mist);
  border-radius: 14px;
  margin-bottom: 18px;
}
.qr-block img {
  width: 158px;
  height: 158px;
  border-radius: 8px;
  border: 3px solid #fff;
  box-shadow: 0 4px 18px rgba(0,0,0,.09);
  image-rendering: pixelated;
  display: block;
}
.qr-placeholder {
  width: 158px; height: 158px;
  border-radius: 8px;
  border: 3px solid #fff;
  box-shadow: 0 4px 18px rgba(0,0,0,.09);
  background: #f0f0f0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 44px;
}
.qr-note {
  font-size: 11px;
  color: #999;
  text-align: center;
  line-height: 1.55;
}
.qr-note strong { color: #555; }

/* ── Download button ──────────────────────────────────────────────── */
.btn-dl {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 13px 0;
  background: var(--ink);
  color: var(--gold);
  font-family: 'DM Sans', sans-serif;
  font-size: 12.5px;
  font-weight: 500;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  border: none;
  border-radius: 11px;
  cursor: pointer;
  transition: background .18s, transform .12s;
  text-decoration: none;
  margin-bottom: 2px;
}
.btn-dl:hover { background: var(--ink-2); transform: translateY(-1px); }
.btn-dl svg   { width: 15px; height: 15px; flex-shrink: 0; }

/* ── Pass footer ──────────────────────────────────────────────────── */
.pass-foot {
  padding: 18px 32px 22px;
  font-size: 10.5px;
  color: #bbb;
  text-align: center;
  line-height: 1.65;
  border-top: 1px solid #f0f0f0;
}
.pass-foot strong { color: #888; }

/* ── Bottom tagline ───────────────────────────────────────────────── */
.tagline {
  margin-top: 38px;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 14.5px;
  color: var(--sage);
  opacity: 0;
  animation: fadeIn 1s ease 1.1s forwards;
}

/* ── Loader / error ───────────────────────────────────────────────── */
.state-view {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  min-height: 280px;
  width: 100%;
  max-width: 480px;
  text-align: center;
}
.state-view.loading { color: var(--sage); font-size: 13.5px; }
.state-view.error   { color: #ef9a9a;    font-size: 13.5px; }
.state-icon { font-size: 42px; }
.spinner {
  width: 34px; height: 34px;
  border: 3px solid rgba(212,160,23,.18);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin .75s linear infinite;
}

/* ── Keyframes ────────────────────────────────────────────────────── */
@keyframes fadeDown { from { opacity:0; transform:translateY(-14px); } to { opacity:1; transform:none; } }
@keyframes riseUp   { from { opacity:0; transform:translateY(26px);  } to { opacity:1; transform:none; } }
@keyframes fadeIn   { to   { opacity:.68; } }
@keyframes spin     { to   { transform:rotate(360deg); } }

@media (max-width: 400px) {
  .detail-grid           { grid-template-columns: 1fr; }
  .pass-body, .pass-head { padding-left: 22px; padding-right: 22px; }
}
</style>
</head>
<body>

<div class="page">

  <div class="logo-bar">
    <div class="wordmark">🦁 WILDNEST</div>
    <div class="sub">Zoo Resort &amp; Wildlife Experience · Carmen, Cebu</div>
  </div>

  <div id="root">
    <div class="state-view loading">
      <div class="spinner"></div>
      <span>Loading booking pass…</span>
    </div>
  </div>

  <p class="tagline">"Where nature and wonder meet."</p>

</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// DATA CONTRACT
// ═══════════════════════════════════════════════════════════════════
// C# (BookingPassViewer.cs) injects before document creation:
//   webView.CoreWebView2.AddScriptToExecuteOnDocumentCreatedAsync(
//       "window.WILDNEST_BOOKING = " + json + ";");
//
// Fallback for browser / QR URL scan:
//   ?id=WN-2026-0001          → shows ID only (no personal data in URL)
//   ?data=<base64-json>       → full payload encoded by C# if needed
//
// Expected shape (BookingPassViewer serializes all fields):
// {
//   bookingId:     "WN-2026-0001",
//   guestName:     "Maria Santos",
//   bookingType:   "Overnight Stay",
//   cabin:         "Treetop Cabin 3",
//   dateInfo:      "May 12 – 14, 2026",
//   totalAmount:   4800.00,
//   paymentMethod: "GCash",
//   status:        "Confirmed",      // Confirmed | Pending | Checked-In | Cancelled
//   qrDataUrl:     "data:image/png;base64,..."
// }
// ═══════════════════════════════════════════════════════════════════

// ── Status theme map ── all keys must match DB Status values ────────
const STATUS_THEME = {
  'Confirmed':  { bg: 'rgba(212,160,23,.13)', border: 'rgba(212,160,23,.40)', text: '#e9c052', dot: '#d4a017' },
  'Pending':    { bg: 'rgba(230,91,0,.12)',   border: 'rgba(230,91,0,.38)',   text: '#ffb074', dot: '#e65b00' },
  'Checked-In': { bg: 'rgba(21,101,192,.12)', border: 'rgba(21,101,192,.38)', text: '#90caf9', dot: '#1565c0' },
  'Overdue':    { bg: 'rgba(198,40,40,.12)',  border: 'rgba(198,40,40,.38)',  text: '#ef9a9a', dot: '#c62828' },
  'Cancelled':  { bg: 'rgba(97,97,97,.14)',   border: 'rgba(97,97,97,.36)',   text: '#bdbdbd', dot: '#757575' },
  'Checked-Out':{ bg: 'rgba(97,97,97,.14)',   border: 'rgba(97,97,97,.36)',   text: '#bdbdbd', dot: '#757575' },
};
const DEFAULT_THEME = STATUS_THEME['Confirmed'];

// ── Bootstrap ───────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // WebView2 injects window.WILDNEST_BOOKING before DOMContentLoaded,
  // but a small delay guards against any edge-case race.
  setTimeout(boot, 80);
});

function boot() {
  try {
    let data = null;

    // Priority 1: injected by C# host via WebView2
    if (window.WILDNEST_BOOKING?.bookingId) {
      data = window.WILDNEST_BOOKING;
    }

    // Priority 2: URL parameters (browser/phone scan fallback)
    if (!data) {
      const p = new URLSearchParams(location.search);
      if (p.get('data')) {
        data = JSON.parse(atob(p.get('data')));
      } else if (p.get('id')) {
        // Minimal data from URL — show what we have
        data = { bookingId: p.get('id') };
      }
    }

    if (!data?.bookingId) {
      showError('No booking reference found.<br>Please use the QR code from your confirmation email.');
      return;
    }

    render(data);
  } catch (err) {
    showError('Unable to load booking pass.<br><small>' + esc(err.message) + '</small>');
  }
}

// ── Render ───────────────────────────────────────────────────────────
function render(d) {
  const fmt   = v  => (v != null && v !== '') ? v : '—';
  const money = v  => (v != null) ? '₱' + Number(v).toLocaleString('en-PH', { minimumFractionDigits: 2 }) : '—';
  const status = d.status || 'Confirmed';
  const theme  = STATUS_THEME[status] || DEFAULT_THEME;

  // ── Inline CSS vars for status theming ───────────────────────────
  const themeStyle = `
    --status-bg:${theme.bg};
    --status-border:${theme.border};
    --status-text:${theme.text};
    --status-dot:${theme.dot};
  `;

  // ── QR image or placeholder ───────────────────────────────────────
  const qrHtml = d.qrDataUrl
    ? `<img src="${d.qrDataUrl}" alt="QR code for booking ${esc(d.bookingId)}">`
    : `<div class="qr-placeholder">📱</div>`;

  // ── Download button (only if QR is embedded) ─────────────────────
  const dlHtml = d.qrDataUrl ? `
    <a class="btn-dl"
       href="${d.qrDataUrl}"
       download="WildNest_QR_${esc(d.bookingId)}.png"
       title="Save QR image to device">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Save QR Image
    </a>` : '';

  // ── Cabin row (hide if day-visit or missing) ──────────────────────
  const cabinHtml = (d.cabin && d.cabin !== 'Day Visit / Experience') ? `
    <div class="detail-item full">
      <div class="lbl">Accommodation</div>
      <div class="val">${esc(d.cabin)}</div>
    </div>` : '';

  document.getElementById('root').innerHTML = `
    <div class="pass" style="${themeStyle}" role="main" aria-label="WildNest Booking Pass">

      <div class="pass-head">
        <div class="status-pill">
          <span class="status-dot" aria-hidden="true"></span>
          ${esc(status)}
        </div>
        <div class="guest-name">${esc(fmt(d.guestName))}</div>
        <div class="booking-ref">
          Booking Reference:&nbsp;<strong>${esc(d.bookingId)}</strong>
        </div>
      </div>

      <div class="pass-body">

        <div class="detail-grid">
          <div class="detail-item">
            <div class="lbl">Booking Type</div>
            <div class="val">${esc(fmt(d.bookingType))}</div>
          </div>
          <div class="detail-item">
            <div class="lbl">Payment</div>
            <div class="val">${esc(fmt(d.paymentMethod))}</div>
          </div>
          <div class="detail-item full">
            <div class="lbl">Date / Stay</div>
            <div class="val">${esc(fmt(d.dateInfo))}</div>
          </div>
          ${cabinHtml}
          <div class="detail-item amount">
            <div class="lbl">Total Amount</div>
            <div class="val">${money(d.totalAmount)}</div>
          </div>
        </div>

        <hr class="perf" aria-hidden="true">

        <div class="qr-block">
          ${qrHtml}
          <div class="qr-note">
            Show or scan at Reception for check-in.<br>
            Booking ID:&nbsp;<strong>${esc(d.bookingId)}</strong>
          </div>
        </div>

        ${dlHtml}

      </div>

      <div class="pass-foot">
        Present this pass at the WildNest Reception desk upon arrival.<br>
        Questions? Contact&nbsp;<strong>zoowildnest@gmail.com</strong>
      </div>

    </div>
  `;
}

// ── State views ───────────────────────────────────────────────────────
function showError(msg) {
  document.getElementById('root').innerHTML = `
    <div class="state-view error" role="alert">
      <div class="state-icon">⚠️</div>
      <div>${msg}</div>
    </div>`;
}

// ── XSS guard ────────────────────────────────────────────────────────
function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#x27;');
}
</script>
</body>
</html>
